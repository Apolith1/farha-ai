workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build React App
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Fix Gradle Wrapper and Build APK
        script: |
          cd android
          # حذف الملف التالف وتوليد ملف جديد سليم
          rm -f gradle/wrapper/gradle-wrapper.jar
          touch gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.2
          
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - hassansaper111222@gmail.com
