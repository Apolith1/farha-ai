workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
      java: 21  # تم التحديث هنا ليتوافق مع مشروعك
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build React App
        script: npm run build
      - name: Reconstruct Android Folder
        script: |
          rm -rf android
          npx cap add android || true
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - hassansaper111222@gmail.com
